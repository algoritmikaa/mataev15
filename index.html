<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 6 игр в одном</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(145deg, #0b1a2e, #1b2f44); display: flex; justify-content: center; align-items: center; padding: 16px; }
        .wrapper { max-width: 700px; width: 100%; background: #1e3b4f; border-radius: 48px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid #3e6a84; text-align: center; }
        h1 { color: #e6f7ff; font-size: 2.4rem; margin: 0 0 8px 0; text-shadow: 0 4px 8px #0a1a2a; }
        .subtitle { color: #8bb8d0; margin-bottom: 28px; opacity: 0.8; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .game-link { display: block; background: #264c61; border-radius: 40px; padding: 18px 8px; color: #ddf0fa; text-decoration: none; box-shadow: 0 6px 0 #0f2838; border: 1px solid #43809e; transition: 0.1s; }
        .game-link:hover { transform: translateY(-2px); background: #2f5a72; }
        .game-link:active { transform: translateY(5px); box-shadow: 0 1px 0 #0f2838; }
        .game-link span { font-size: 2.2rem; display: block; margin-bottom: 4px; }
        .footer { color: #628ea8; font-size: 0.8rem; margin-top: 24px; border-top: 1px solid #2a4a5a; padding-top: 18px; }
        @media (max-width: 500px) { .grid { gap: 8px; } .game-link { font-size: 0.75rem; padding: 14px 4px; } .game-link span { font-size: 1.6rem; } }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>🎮 Аркады</h1>
    <div class="subtitle">6 классических игр</div>
    <div class="grid">
        <a href="car.html" class="game-link"><span>🚗</span>Гонки</a>
        <a href="spider.html" class="game-link"><span>🕷️</span>Выживание</a>
        <a href="tetris.html" class="game-link"><span>🧱</span>Тетрис</a>
        <a href="hungry.html" class="game-link"><span>🍔</span>Блок-бласт</a>
        <a href="snake.html" class="game-link"><span>🐍</span>Змейка</a>
        <a href="puzzle.html" class="game-link"><span>🧩</span>Пятнашки</a>
    </div>
    <div class="footer">📁 car.html · spider.html · tetris.html · hungry.html · snake.html · puzzle.html</div>
</div>
</body>
</html>
